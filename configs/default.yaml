global:
  project_name: "busel"
  device: "cuda"
  seed: 42
  precision: "bf16"

profiles:
  # ═══════════════════════════════════════════════════════════════════
  # sovereign_test — мини-тест (4M params, все фичи, ~3 мин)
  # ═══════════════════════════════════════════════════════════════════
  sovereign_test:
    model:
      d_model: 128
      n_layers: 2
      n_heads: 4
      expert_hidden: 256
      num_experts: 4
      top_k: 1
      vocab_size: 326
      n_hyper: 2
      num_mtp_heads: 12
      selective_backward: true
      backward_ratio: 0.5
      nsa_n_heads: 16          # fallback to MLA при d_model<256
    data:
      data_path: "data_train"
      chunk_size: 256
      batch_size: 128
      mix_weights: {fineweb: 0.60, cosmopedia: 0.10, wiki: 0.30}
    training:
      max_steps: 200
      warmup_steps: 10
      min_lr_ratio: 0.3
      learning_rate_muon: 0.003
      learning_rate_adamw: 0.0003
      weight_decay: 0.1
      grad_accum_steps: 2
      mod_capacity: 0.5
      mod_interval: 1
      use_dispersion_loss: true
      use_rho_loss: true
      lr_schedule: "wsd"
      wsd_decay_frac: 0.1
      sct_rank: 8
      use_dropbp: true
    perf:
      keep_last_n: 3
      grad_ckpt_every: 3

  # ═══════════════════════════════════════════════════════════════════
  # sovereign_5h — ~5 часов (~70M params) — минимальный чат-бот
  # ═══════════════════════════════════════════════════════════════════
  sovereign_5h:
    model:
      d_model: 512
      n_layers: 8
      n_heads: 8
      expert_hidden: 1024
      num_experts: 6
      top_k: 1
      vocab_size: 326
      n_hyper: 2
      num_mtp_heads: 8
      selective_backward: true
      backward_ratio: 0.5
      nsa_n_heads: 16          # d_k=512/16=32 ✓
    data:
      data_path: "data_train"
      chunk_size: 4096
      batch_size: 256
      mix_weights: {fineweb: 0.60, cosmopedia: 0.10, wiki: 0.30}
    training:
      max_steps: "auto"
      warmup_steps: "auto"
      min_lr_ratio: 0.3
      learning_rate_muon: 0.002
      learning_rate_adamw: 0.0002
      weight_decay: 0.1
      grad_accum_steps: 1       # no accumulation — full batch per step
      mod_capacity: 1.0       # MoD off — 58M too small, hurts training
      mod_interval: 1
      use_dropbp: false       # DropBP off — 58M too small, hurts training
      use_dispersion_loss: true
      use_rho_loss: true
      lr_schedule: "wsd"
      wsd_decay_frac: 0.1
      sct_rank: 8
    perf:
      keep_last_n: 3
      dynamic_compile: false   # меньше Python overhead между слоями
      grad_ckpt_every: 4    # batch=288 хватает VRAM → меньше рекомпьюта

  # ═══════════════════════════════════════════════════════════════════
  # sovereign_12h — ~12 часов (~170M params, 37 tok/param → 6.3B tokens)
  # ═══════════════════════════════════════════════════════════════════
  sovereign_12h:
    model:
      d_model: 768
      n_layers: 8
      n_heads: 8
      expert_hidden: 1536
      num_experts: 6
      top_k: 1
      vocab_size: 326
      n_hyper: 2
      num_mtp_heads: 10
      selective_backward: true
      backward_ratio: 0.5
      nsa_n_heads: 16
    data:
      data_path: "data_train"
      chunk_size: 4096
      batch_size: 96
      mix_weights: {fineweb: 0.60, cosmopedia: 0.10, wiki: 0.30}
    training:
      max_steps: "auto"
      warmup_steps: "auto"
      min_lr_ratio: 0.3
      learning_rate_muon: 0.002
      learning_rate_adamw: 0.0002
      weight_decay: 0.1
      grad_accum_steps: 2
      mod_capacity: 0.5
      mod_interval: 1
      use_dispersion_loss: true
      use_rho_loss: true
      use_ascii_curriculum: true
      lr_schedule: "wsd"
      wsd_decay_frac: 0.1
      sct_rank: 8
      use_dropbp: true
    perf:
      keep_last_n: 4
      grad_ckpt_every: 3

  # ═══════════════════════════════════════════════════════════════════
  # sovereign_24h — ~24 часа (~350M params, 37 tok/param → 13B tokens)
  # ═══════════════════════════════════════════════════════════════════
  sovereign_24h:
    model:
      d_model: 768
      n_layers: 16
      n_heads: 8
      expert_hidden: 1536
      num_experts: 6
      top_k: 1
      vocab_size: 326
      n_hyper: 2
      num_mtp_heads: 12
      selective_backward: true
      backward_ratio: 0.5
      progressive_freeze: true
      nsa_n_heads: 16
    data:
      data_path: "data_train"
      chunk_size: 4096
      batch_size: 64
      mix_weights: {fineweb: 0.60, cosmopedia: 0.10, wiki: 0.30}
    training:
      max_steps: "auto"
      warmup_steps: "auto"
      min_lr_ratio: 0.3
      learning_rate_muon: 0.002
      learning_rate_adamw: 0.0002
      weight_decay: 0.1
      grad_accum_steps: 2
      mod_capacity: 0.5
      mod_interval: 1
      use_dispersion_loss: true
      use_rho_loss: true
      use_ascii_curriculum: true
      lr_schedule: "wsd"
      wsd_decay_frac: 0.1
      sct_rank: 8
      use_dropbp: true
    perf:
      keep_last_n: 5
      grad_ckpt_every: 3

  # ═══════════════════════════════════════════════════════════════════
  # sovereign_3d — ~3 дня (~1B params, 37 tok/param → 37B tokens)
  # ═══════════════════════════════════════════════════════════════════
  sovereign_3d:
    model:
      d_model: 1024
      n_layers: 18
      n_heads: 16
      expert_hidden: 2048
      num_experts: 6
      top_k: 1
      vocab_size: 326
      n_hyper: 2
      num_mtp_heads: 12
      selective_backward: true
      backward_ratio: 0.5
      progressive_freeze: true
      nsa_n_heads: 16
    data:
      data_path: "data_train"
      chunk_size: 4096
      batch_size: 28
      mix_weights: {fineweb: 0.60, cosmopedia: 0.10, wiki: 0.30}
    training:
      max_steps: "auto"
      warmup_steps: "auto"
      min_lr_ratio: 0.3
      learning_rate_muon: 0.002
      learning_rate_adamw: 0.0002
      weight_decay: 0.1
      grad_accum_steps: 2
      mod_capacity: 0.5
      mod_interval: 1
      use_dispersion_loss: true
      use_rho_loss: true
      use_ascii_curriculum: true
      lr_schedule: "wsd"
      wsd_decay_frac: 0.1
      sct_rank: 8
      use_dropbp: true
    perf:
      keep_last_n: 5
      grad_ckpt_every: 3
    yarn:
      enabled: false
      target_scale: 32.0
      start_step_frac: 0.92
      duration_frac: 0.08