global:
  project_name: "busel"
  device: "cuda"
  seed: 42
  precision: "bf16"

profiles:
  # ═══════════════════════════════════════════════════════════════════
  # chizh-8m — мини-тест (~9M SCT-32)
  # ═══════════════════════════════════════════════════════════════════
  chizh-9m:
    model:
      d_model: 384
      n_layers: 4
      n_heads: 6
      expert_hidden: 768
      num_experts: 4
      top_k: 1
      vocab_size: 326
      n_hyper: 2
      num_mtp_heads: 4
      selective_backward: false
      backward_ratio: 1.0
    data:
      data_path: "data_train"
      chunk_size: 4096        # мин 512 байт для патчей
      batch_size: 4096         # макс throughput для scaling laws
      mix_weights: {fineweb: 0.60, cosmopedia: 0.10, wiki: 0.30}
    training:
      max_steps: 500
      warmup_steps: "5%"
      min_lr_ratio: 0.3
      learning_rate_muon: 0.001
      learning_rate_adamw: 0.00005
      weight_decay: 0.1
      grad_accum_steps: 4
      mod_capacity: 0.5        # ponytail: temp — test MoD router fix
      mod_interval: 1
      use_dispersion_loss: false
      use_rho_loss: false
      use_ascii_curriculum: true
      lr_schedule: "cosine"
      sct_rank: 32            # минимум по SCT paper для 1.7B → масштабируем вниз
    perf:
      keep_last_n: 1
      grad_ckpt_every: 2

  # ═══════════════════════════════════════════════════════════════════
  # verabey-27m — GPT-2-mini эквивалент (40M SCT-32, 128M эффект.)
  # ═══════════════════════════════════════════════════════════════════
  verabey-67m:
    model:
      d_model: 512
      n_layers: 12
      n_heads: 8
      expert_hidden: 1024
      num_experts: 6
      top_k: 1
      vocab_size: 326
      n_hyper: 2
      num_mtp_heads: 6
      selective_backward: true
      backward_ratio: 0.5
      nsa_n_heads: 16
    data:
      data_path: "data_train"
      chunk_size: 4096
      batch_size: 8192
      mix_weights: {fineweb: 0.60, cosmopedia: 0.10, wiki: 0.30}
    training:
      max_steps: "auto"
      target_tok_per_param: 80
      warmup_steps: "5%"
      min_lr_ratio: 0.3
      learning_rate_muon: 0.002
      learning_rate_adamw: 0.0002
      weight_decay: 0.1
      grad_accum_steps: 4
      mod_capacity: 0.5
      mod_interval: 1
      use_dispersion_loss: false
      use_rho_loss: false
      use_ascii_curriculum: true
      lr_schedule: "cosine"
      sct_rank: 32
      lotus_rank: 32
      use_dropbp: true
    perf:
      keep_last_n: 3
      grad_ckpt_every: 3

  # ═══════════════════════════════════════════════════════════════════
  # sokal-120m — на ночь (~120M SCT-128, ~8 часов)
  # ═══════════════════════════════════════════════════════════════════
  sokal-120m:
    model:
      d_model: 768
      n_layers: 8
      n_heads: 8
      expert_hidden: 1536
      num_experts: 6
      top_k: 1
      vocab_size: 326
      n_hyper: 2
      num_mtp_heads: 6        # 6 голов — оптимально для байт-модели (t+24 байта)
      selective_backward: true
      backward_ratio: 0.5
      nsa_n_heads: 16
    data:
      data_path: "data_train"
      chunk_size: 4096
      batch_size: 1536
      mix_weights: {fineweb: 0.60, cosmopedia: 0.10, wiki: 0.30}
    training:
      max_steps: "auto"
      warmup_steps: "5%"
      min_lr_ratio: 0.3
      learning_rate_muon: 0.002
      learning_rate_adamw: 0.0002
      weight_decay: 0.1
      grad_accum_steps: 4
      mod_capacity: 0.5
      mod_interval: 1
      use_dispersion_loss: true
      use_rho_loss: false  # ponytail: RHO-Loss → NaN
      use_ascii_curriculum: true
      lr_schedule: "wsd"
      wsd_decay_frac: 0.1
      sct_rank: 128
      use_dropbp: true
    perf:
      keep_last_n: 4
      grad_ckpt_every: 3

  # ═══════════════════════════════════════════════════════════════════
  # kruk-210m — сильная модель (~210M SCT-128)
  # ═══════════════════════════════════════════════════════════════════
  kruk-210m:
    model:
      d_model: 768
      n_layers: 16
      n_heads: 8
      expert_hidden: 1536
      num_experts: 6
      top_k: 1
      vocab_size: 326
      n_hyper: 2
      num_mtp_heads: 6        # 6 голов — оптимально для байт-модели (t+24 байта)
      selective_backward: true
      backward_ratio: 0.5
      progressive_freeze: true
      nsa_n_heads: 16
    data:
      data_path: "data_train"
      chunk_size: 4096
      batch_size: 768
      mix_weights: {fineweb: 0.60, cosmopedia: 0.10, wiki: 0.30}
    training:
      max_steps: auto
      target_tok_per_param: 80  # overrides scaling law 37 → 80 tok/param
      warmup_steps: "5%"
      min_lr_ratio: 0.3
      learning_rate_muon: 0.0015  # LR-finder: stable up to 0.01 on clean model; 0.0015 with all features
      learning_rate_adamw: 0.00015
      weight_decay: 0.1
      grad_accum_steps: 4
      mod_capacity: 0.5
      mod_interval: 1
      use_dispersion_loss: false
      use_rho_loss: false  # ponytail: NaN at step~177; diagnostic 200 steps clean without
      use_ascii_curriculum: true
      lr_schedule: "cosine"
      wsd_decay_frac: 0.1
      sct_rank: 128
      lotus_rank: 128  # match SCT rank — LR-finder stable at 0.01 with this
      use_dropbp: true
      debug: false  # true = NaN checks + weight diag; false = max training speed
    perf:
      keep_last_n: 5
      grad_ckpt_every: 3

  # ═══════════════════════════════════════════════════════════════════
  # busel-365m — флагман (~365M SCT-128)
  # ═══════════════════════════════════════════════════════════════════
  busel-365m:
    model:
      d_model: 1024
      n_layers: 18
      n_heads: 16
      expert_hidden: 2048
      num_experts: 6
      top_k: 1
      vocab_size: 326
      n_hyper: 2
      num_mtp_heads: 6        # 6 голов — оптимально для байт-модели (t+24 байта)
      selective_backward: true
      backward_ratio: 0.5
      progressive_freeze: true
      nsa_n_heads: 16
    data:
      data_path: "data_train"
      chunk_size: 4096
      batch_size: 448
      mix_weights: {fineweb: 0.60, cosmopedia: 0.10, wiki: 0.30}
    training:
      max_steps: "auto"
      warmup_steps: "auto"
      min_lr_ratio: 0.3
      learning_rate_muon: 0.002
      learning_rate_adamw: 0.0002
      weight_decay: 0.1
      grad_accum_steps: 4
      mod_capacity: 0.5
      mod_interval: 1
      use_dispersion_loss: true
      use_rho_loss: false  # ponytail: RHO-Loss → NaN
      use_ascii_curriculum: true
      lr_schedule: "wsd"
      wsd_decay_frac: 0.1
      sct_rank: 128
      use_dropbp: true
    perf:
      keep_last_n: 5
      grad_ckpt_every: 3
    yarn:
      enabled: false
      target_scale: 32.0
      start_step_frac: 0.92
      duration_frac: 0.08