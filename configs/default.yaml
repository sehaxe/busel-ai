global:
  project_name: busel
  device: cuda
  seed: 42
  precision: bf16
profiles:
  chizh-9m:
    model:
      d_model: 384
      n_layers: 4
      n_heads: 6
      expert_hidden: 768
      num_experts: 4
      top_k: 1
      vocab_size: 326
      n_hyper: 2
      num_mtp_heads: 3               # MTP-3: только +1/+2/+3, b4 — anchor следующего
      n_patches: 32
      selective_backward: false
      backward_ratio: 1.0
    data:
      data_path: data_train
      chunk_size: 16384
      batch_size: 4096
      mix_weights:
        fineweb: 0.6
        cosmopedia: 0.1
        wiki: 0.3
    training:
      max_steps: 500
      warmup_steps: 5%
      min_lr_ratio: 0.3
      learning_rate_muon: 0.001
      learning_rate_adamw: 5.0e-05
      weight_decay: 0.1
      grad_accum_steps: 1
      mod_capacity: 0.5
      mod_interval: 1
      use_dispersion_loss: false
      use_rho_loss: false
      use_ascii_curriculum: true
      lr_schedule: cosine
      sct_rank: 32
      lotus_rank: 32
      use_dropbp: true
    perf:
      keep_last_n: 1
      grad_ckpt_every: 2
  verabey-40m:
    model:
      d_model: 512
      n_layers: 12
      n_heads: 8
      expert_hidden: 1024
      num_experts: 6
      top_k: 1
      vocab_size: 326
      n_hyper: 2
      num_mtp_heads: 3               # MTP-3: b1/b2/b3 на сдвигах +1/+2/+3. b4 (shift+4) — anchor следующего патча, тавтология.
      n_patches: 32
      selective_backward: true
      backward_ratio: 0.5            # Оставляем 0.5. Это дает оптимальный баланс скорости (-44% времени шага) и качества
      nsa_n_heads: 16
      progressive_freeze: true       # ВКЛЮЧЕНО. Постепенно замораживает до 75% слоев к концу обучения, стабилизируя веса и ускоряя финал
    data:
      data_path: data_train
      chunk_size: 16384
      batch_size: 128              # 15GB RAM — консервативно
      mix_weights:
        fineweb: 0.6
        cosmopedia: 0.1
        wiki: 0.3
    training:
      max_steps: auto
      target_tok_per_param: 80       # Оптимальный объем токенов для быстрого и качественного обучения 40M модели
      warmup_steps: 5%
      min_lr_ratio: 0.3
      learning_rate_muon: 0.002
      learning_rate_adamw: 0.0002
      weight_decay: 0.1
      grad_accum_steps: 5            # 160×5=800 — примерно как было 768, 5 микро-батчей вместо 6
      mod_capacity: 0.5
      mod_interval: 1
      use_dispersion_loss: false     # ВЫКЛЮЧЕНО: −2-5% времени, −500 MB VRAM. Включить при финальной доводке.
      use_rho_loss: false
      use_ascii_curriculum: true
      lr_schedule: wsd               # Изменено с cosine на wsd (Warmup-Stable-Decay) для лучшей финальной сходимости
      wsd_decay_frac: 0.1
      sct_rank: 32
      lotus_rank: 32
      use_dropbp: true
    perf:
      keep_last_n: 3
      grad_ckpt_every: 1            # 2→1: чекпоинтим каждый слой, -~500 MB пикового VRAM. Даёт стабильность BS=160.
  sokal-120m:
    model:
      d_model: 768
      n_layers: 8
      n_heads: 8
      expert_hidden: 1536
      num_experts: 6
      top_k: 1
      vocab_size: 326
      n_hyper: 2
      num_mtp_heads: 3               # MTP-3: только сдвиги +1/+2/+3, b4 — тавтология
      n_patches: 32
      selective_backward: true
      backward_ratio: 0.5
      nsa_n_heads: 16
    data:
      data_path: data_train
      chunk_size: 16384
      batch_size: 2048
      mix_weights:
        fineweb: 0.6
        cosmopedia: 0.1
        wiki: 0.3
    training:
      max_steps: auto
      warmup_steps: 5%
      min_lr_ratio: 0.3
      learning_rate_muon: 0.002
      learning_rate_adamw: 0.0002
      weight_decay: 0.1
      grad_accum_steps: 2
      mod_capacity: 0.5
      mod_interval: 1
      use_dispersion_loss: true
      use_rho_loss: false
      use_ascii_curriculum: true
      lr_schedule: wsd
      wsd_decay_frac: 0.1
      sct_rank: 32
      use_dropbp: true
      lotus_rank: 32
    perf:
      keep_last_n: 4
      grad_ckpt_every: 3
  kruk-210m:
    model:
      d_model: 768
      n_layers: 16
      n_heads: 8
      expert_hidden: 1536
      num_experts: 6
      top_k: 1
      vocab_size: 326
      n_hyper: 2
      num_mtp_heads: 3               # MTP-3
      n_patches: 32
      selective_backward: true
      backward_ratio: 0.5
      progressive_freeze: true
      nsa_n_heads: 16
    data:
      data_path: data_train
      chunk_size: 16384
      batch_size: 1024
      mix_weights:
        fineweb: 0.6
        cosmopedia: 0.1
        wiki: 0.3
    training:
      max_steps: auto
      target_tok_per_param: 80
      warmup_steps: 5%
      min_lr_ratio: 0.3
      learning_rate_muon: 0.0015
      learning_rate_adamw: 0.00015
      weight_decay: 0.1
      grad_accum_steps: 2
      mod_capacity: 0.5
      mod_interval: 1
      use_dispersion_loss: false
      use_rho_loss: false
      use_ascii_curriculum: true
      lr_schedule: cosine
      wsd_decay_frac: 0.1
      sct_rank: 32
      lotus_rank: 32
      use_dropbp: true
      debug: false
    perf:
      keep_last_n: 5
      grad_ckpt_every: 3
  busel-365m:
    model:
      d_model: 1024
      n_layers: 18
      n_heads: 16
      expert_hidden: 2048
      num_experts: 6
      top_k: 1
      vocab_size: 326
      n_hyper: 2
      num_mtp_heads: 3               # MTP-3
      n_patches: 32
      selective_backward: true
      backward_ratio: 0.5
      progressive_freeze: true
      nsa_n_heads: 16
    data:
      data_path: data_train
      chunk_size: 16384
      batch_size: 448
      mix_weights:
        fineweb: 0.6
        cosmopedia: 0.1
        wiki: 0.3
    training:
      max_steps: auto
      warmup_steps: auto
      min_lr_ratio: 0.3
      learning_rate_muon: 0.002
      learning_rate_adamw: 0.0002
      weight_decay: 0.1
      grad_accum_steps: 2
      mod_capacity: 0.5
      mod_interval: 1
      use_dispersion_loss: true
      use_rho_loss: false
      use_ascii_curriculum: true
      lr_schedule: wsd
      wsd_decay_frac: 0.1
      sct_rank: 32
      use_dropbp: true
      lotus_rank: 32
    perf:
      keep_last_n: 5
      grad_ckpt_every: 3
    yarn:
      enabled: false
      target_scale: 32.0
      start_step_frac: 0.92
      duration_frac: 0.08
