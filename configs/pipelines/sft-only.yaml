name: sft-only
description: "Smoke test: SFT stage only, resuming from validation pretrain checkpoint. Verifies the v5.6 SFT stage + registry dispatch + checkpoint handoff."

stages:
  - name: sft
    resume: checkpoints/busel_validation_FINAL.pt
    params:
      profile_name: validation
      data_glob: "data_train/sft/**/*.jsonl"
      max_steps: 20
      warmup_steps: 5
      sft_lr_scale: 0.3
      sft_data_glob: "data_train/sft/**/*.jsonl"
